name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install project
        run: python -m venv .venv && . .venv/bin/activate && pip install -e .

      - name: Run tests
        run: . .venv/bin/activate && python -m unittest discover -s tests -v
